name: Build Xiotty DLC APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Install Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Fix MainActivity.kt
        run: |
          sed -i 's/findViewById<Switch>(R\.id\.switchChams)/findViewById<android.widget.Switch>(R.id.switchChams)/g' app/src/main/kotlin/com/xiotty/dlc/MainActivity.kt
          sed -i 's/findViewById<Switch>(R\.id\.switchBunnyHop)/findViewById<android.widget.Switch>(R.id.switchBunnyHop)/g' app/src/main/kotlin/com/xiotty/dlc/MainActivity.kt
          sed -i 's/findViewById<Switch>(R\.id\.switchBoxESP)/findViewById<android.widget.Switch>(R.id.switchBoxESP)/g' app/src/main/kotlin/com/xiotty/dlc/MainActivity.kt
          sed -i 's/findViewById<Switch>(R\.id\.switchSnaplines)/findViewById<android.widget.Switch>(R.id.switchSnaplines)/g' app/src/main/kotlin/com/xiotty/dlc/MainActivity.kt
          sed -i 's/findViewById<Switch>(R\.id\.switchSilentAim)/findViewById<android.widget.Switch>(R.id.switchSilentAim)/g' app/src/main/kotlin/com/xiotty/dlc/MainActivity.kt
          grep -n "Switch\|switchChams" app/src/main/kotlin/com/xiotty/dlc/MainActivity.kt

      - name: Create gradlew
        run: gradle wrapper --gradle-version 8.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --warning-mode none --rerun-tasks

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Xiotty-DLC-debug
          path: app/build/outputs/apk/debug/*.apk
